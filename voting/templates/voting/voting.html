{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   PAGE TITLE
========================= */
.vote-page{
    max-width:1100px;
    margin:0 auto;
    text-align:center;
}
.vote-title{
    font-size:34px;
    font-weight:800;
    margin-bottom:30px;
}

/* =========================
   PLAYER GRID
========================= */

.players-container{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

/* =========================
   PLAYER CARD
========================= */

.player-card{
    background: var(--card);
    width:220px;
    padding:20px;
    border-radius:18px;
    cursor:grab;
    box-shadow: var(--shadow-md);
    border:1px solid var(--border);
    transition:.2s;
    position:relative;
}

.player-card:hover{
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
}

/* Headshot */

.player-headshot{
    width:160px;
    height:auto;
}

/* Team Logo */

.team-logo{
    width:24px;
    vertical-align:middle;
    margin-right:6px;
}

/* Player Name */

.player-card h3{
    margin:12px 0 6px 0;
    font-size:20px;
}

/* Position Text */

.player-position{
    color: var(--text-secondary);
    font-size:14px;
}

/* Rank Badge */

.rank-number{
    position:absolute;
    top:12px;
    left:12px;
    background:#f1f0ff;
    color: var(--primary-600);
    font-weight:700;
    padding:6px 12px;
    border-radius:12px;
    font-size:14px;
}

/* =========================
   BUTTONS
========================= */

.vote-buttons{
    margin-top:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

button{
    width:280px;
    padding:14px 25px;
    font-size:16px;
    background: var(--primary-500);
    color:white;
    border:none;
    border-radius:40px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
    box-shadow: var(--shadow-sm);
}

button:hover{
    background: var(--primary-600);
    transform: translateY(-2px);
}

.skip-button{
    background: var(--bg-soft);
    color: var(--text-secondary);
}

.skip-button:hover{
    background: var(--border);
}

form{
    display:flex;
    flex-direction:column;
    align-items:center;
}
    /* =========================
   MOBILE RESPONSIVE
========================= */

/* =========================
   MOBILE VOTING ELITE UI
========================= */

@media (max-width:768px){

.vote-page{
    padding:12px;
}

.vote-title{
    font-size:22px;
    margin-bottom:18px;
}

/* STACK cards vertically */

.players-container{
    display:flex;
    flex-direction:column;
    gap:14px;
}

/* MOBILE CARD */

.player-card{
    width:100%;
    padding:18px 14px 16px 14px;
    border-radius:22px;
    text-align:center;
    cursor:grab;
}

/* rank bubble like screenshot */

.rank-number{
    top:10px;
    left:10px;
    background:#ebe9ff;
    color:#6c5ce7;
    font-size:13px;
    padding:5px 10px;
    border-radius:14px;
}

/* BIG headshot */

.player-headshot{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-top:6px;
}

/* name */

.player-card h3{
    font-size:18px;
    margin-top:6px;
}

/* meta row */

.player-position{
    margin-top:4px;
    font-size:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}

/* BUTTONS FULL WIDTH */

.vote-buttons{
    margin-top:18px;
    gap:10px;
    width:100%;
}

button{
    width:100%;
    height:54px;
    font-size:17px;
    border-radius:40px;
}

/* skip button soft */

.skip-button{
    background:#eef0f6;
}

}

</style>

<div class="vote-page">

    <h1 class="vote-title">
Drag Players In Order of Dynasty Value Best → Worst
</h1>


<form method="POST">
{% csrf_token %}

<div class="players-container" id="players">

{% for player in players %}

<div class="player-card" data-player="{{ player.id }}">

<div class="rank-number"></div>

<img src="https://cdn.nba.com/headshots/nba/latest/260x190/{{ player.player_id }}.png"
class="player-headshot">

<h3>{{ player.name }}</h3>

<p class="player-position">
<img src="{{ player.logo_url }}" class="team-logo">
{{ player.position }}
</p>

<input type="hidden" name="player_{{ player.id }}" id="input_{{ player.id }}">

</div>

{% endfor %}

</div>

<div class="vote-buttons">
<button type="submit">Submit Vote</button>

<button type="submit" name="skip_vote" value="1" class="skip-button">
I Don't Know These Players
</button>
</div>

</form>


<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<script>

const container = document.getElementById("players")

new Sortable(container,{
    animation:200,
    ghostClass: "dragging",
    onEnd:updateRanks
})

function updateRanks(){

    const cards = container.children

    for(let i=0;i<cards.length;i++){

        const playerId = cards[i].dataset.player
        const rank = i+1

        document.getElementById("input_"+playerId).value = rank

        cards[i].querySelector(".rank-number").innerHTML = "#"+rank
    }
}

updateRanks()

</script>

{% endblock %}
